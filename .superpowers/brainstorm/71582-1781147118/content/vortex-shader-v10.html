<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Gatecaster — vortex intro (shader v10: tuned defaults, no caustics)</title>
<style>
  html,body { margin:0; height:100%; background:#000; overflow:hidden; }
  canvas { position:fixed; inset:0; width:100vw; height:100vh; }
  #ui { position:fixed; top:14px; left:50%; transform:translateX(-50%); color:#aaa;
        font:12px -apple-system,system-ui,sans-serif; background:rgba(20,20,24,.8);
        border:1px solid #333; border-radius:8px; padding:6px 14px; z-index:10;
        display:flex; gap:12px; align-items:center }
  #ui button { background:#444; color:#fff; border:0; border-radius:6px; padding:4px 12px;
               font-size:12px; cursor:pointer }
  #panel { position:fixed; top:14px; right:14px; width:230px; z-index:10;
           color:#bbb; font:11px -apple-system,system-ui,sans-serif;
           background:rgba(20,20,24,.85); border:1px solid #333; border-radius:10px;
           padding:10px 12px; }
  #panel h3 { margin:0 0 8px; font-size:11px; color:#ddd; letter-spacing:.4px;
              display:flex; justify-content:space-between; align-items:center }
  #panel h3 button { background:none; border:0; color:#888; cursor:pointer; font-size:11px }
  #panel .row { display:grid; grid-template-columns: 86px 1fr 36px; gap:6px;
                align-items:center; margin:4px 0 }
  #panel input[type=range] { width:100%; accent-color:#9ab8ff; height:14px }
  #panel .val { text-align:right; color:#9ab8ff; font-variant-numeric:tabular-nums }
  #panel .sect { margin-top:8px; padding-top:6px; border-top:1px solid #2c2c34;
                 color:#777; font-size:10px; text-transform:uppercase; letter-spacing:.8px }
  #err { position:fixed; bottom:10px; left:10px; right:10px; color:#ff8080;
         font:12px monospace; z-index:20; white-space:pre-wrap }
</style>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="txt"></canvas>
<div id="ui">
  <span id="phaseLabel">fill</span>
  <button id="playBtn">Pause</button>
  <input id="scrub" type="range" min="0" max="8" step="0.01" value="0" style="width:180px;accent-color:#9ab8ff">
  <span id="tLabel" style="font-variant-numeric:tabular-nums">0.00s</span>
  <button id="replay">Replay</button>
</div>
<div id="panel">
  <h3>Tweaks <button id="reset">reset</button></h3>
  <div id="rows"></div>
</div>
<div id="err"></div>

<script>
window.onerror = function (m, s, l) {
  document.getElementById('err').textContent = 'JS error: ' + m + ' (line ' + l + ')';
};

(function () {
'use strict';
var err = function (m) { document.getElementById('err').textContent = m; };

var glc = document.getElementById('gl');
var gl = glc.getContext('webgl');
if (!gl) { err('WebGL unavailable'); return; }
var tc = document.getElementById('txt');
var tx = tc.getContext('2d');

var VS = 'attribute vec2 p; void main(){ gl_Position = vec4(p,0.,1.); }';

var FS = [
'precision highp float;',
'uniform vec2 R;',
'uniform float T;',
'uniform vec2 WIN;',
'uniform float SW, RUSH, STR, AB, GAMP, GFREQ, LENS, HALO, WISP, DIVEZ, KEP, PORTAL;',
'',
'const float TAU = 6.2831853;',
'const float FILL_END = 1.6;',
'const float SUCK_END = 4.6;',
'const float DIVE_END = 6.0;',
'const float REVEAL_END = 7.0;',
'',
'float hash21(vec2 p){ p = fract(p*vec2(123.34,456.21)); p += dot(p,p+45.32); return fract(p.x*p.y); }',
'float ease(float u){ u = clamp(u,0.,1.); return u*u*(3.-2.*u); }',
'',
'// log-polar star layer; y wraps every `cells` so the angular seam is invisible.',
'float starLayerLP(vec2 uv, float cells, float t, float fillT, float stretch){',
'  vec2 id = floor(uv);',
'  id.y = mod(id.y, cells);',
'  vec2 gv = fract(uv)-.5;',
'  float h = hash21(id);',
'  if (h < .88) return 0.;',
'  vec2 off = (vec2(hash21(id+1.1), hash21(id+2.7)) - .5)*.7;',
'  vec2 d2 = gv - off;',
'  float d = sqrt(d2.x*d2.x*(1.+stretch*7.) + d2.y*d2.y/(1.+stretch*34.));',
'  float birth = fract(h*7.13)*1.4;',
'  float alive = smoothstep(birth, birth+.6, fillT);',
'  float tw = .55 + .45*sin(t*3. + h*40.);',
'  return exp(-d*d*340.) * tw * alive;',
'}',
'',
'float field(vec2 p, float t, float suck, float fillT, float swirlOff){',
'  float r = length(p);',
'  float a = atan(p.y, p.x);',
'  float maxR = length(R)*.5;',
'  float rs = mix(r, r*RUSH + 80., suck*suck);',
'  // keplerian rotation: inner stars orbit fast (1/r), outer ones crawl;',
'  '+'// KEP blends between the old smooth exp profile and the 1/r one',
'  float prof = mix(exp(-r/maxR*2.5), min(140./(r + 70.), 2.5), KEP);',
'  float swirl = (suck*SW + swirlOff) * prof;',
'  float a2 = a + swirl;',
'  float lr = log(rs + 30.);',
'  float stretch = suck * clamp(650./max(r,30.), .5, STR);',
'  float m  = starLayerLP(vec2(lr*6.,        a2/TAU*48.),  48., t,     fillT, stretch);',
'  m += .8 * starLayerLP(vec2(lr*9. + 17.,   a2/TAU*80.),  80., t*1.3, fillT, stretch);',
'  m += .5 * starLayerLP(vec2(lr*13. + 41.,  a2/TAU*128.), 128., t*.8, fillT, stretch);',
'  return m;',
'}',
'',
'// calm round stars confined in the window after collapse',
'float calmLayer(vec2 uv, float t){',
'  vec2 id = floor(uv), gv = fract(uv)-.5;',
'  float h = hash21(id);',
'  if (h < .88) return 0.;',
'  vec2 off = (vec2(hash21(id+1.1), hash21(id+2.7)) - .5)*.7;',
'  float d = length(gv - off);',
'  float tw = .55 + .45*sin(t*2.2 + h*40.);',
'  return exp(-d*d*340.) * tw;',
'}',
'float calmField(vec2 p, float t){',
'  vec2 uv = p + vec2(sin(t*.21), cos(t*.17))*6.;',
'  return calmLayer(uv*.02, t) + .7*calmLayer(uv*.045 + 7., t*1.2);',
'}',
'',
'float roundRectSD(vec2 p, vec2 hsz, float rad){',
'  vec2 q = abs(p) - hsz + rad;',
'  return length(max(q,0.)) + min(max(q.x,q.y),0.) - rad;',
'}',
'',
'// value noise + fbm for glass ripple and the tunnel interior',
'float vnoise(vec2 p){',
'  vec2 i = floor(p), f = fract(p);',
'  f = f*f*(3.-2.*f);',
'  float a = hash21(i),              b = hash21(i+vec2(1.,0.));',
'  float c = hash21(i+vec2(0.,1.)),  d = hash21(i+vec2(1.,1.));',
'  return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);',
'}',
'float fbm(vec2 p){',
'  float v = 0., amp = .5;',
'  for (int i = 0; i < 4; i++){ v += amp*vnoise(p); p = p*2.1 + 13.7; amp *= .5; }',
'  return v;',
'}',
'',
'void main(){',
'  vec2 sp = gl_FragCoord.xy - R*.5;',
'  sp.y = -sp.y;',
'  float t = T;',
'  float suck   = ease((t-FILL_END)/(SUCK_END-FILL_END));',
'  float dive   = ease((t-SUCK_END)/(DIVE_END-SUCK_END));',
'  float reveal = dive;   // modal opens DURING the dive, not after',
'',
'  // camera dives INTO the vortex: world coords shrink, so the horizon and',
'  '+'// the tunnel behind it expand past the screen edges',
'  float zoom = mix(1., DIVEZ, dive);',
'  vec2 p = sp * zoom;',
'  float r = length(p);',
'  float hr = 26. + 40.*(1.-suck);',
'',
'  vec3 col = vec3(0.);    // pure black space',
'',
'  // glass distortion: wavy fbm displacement strongest near the horizon,',
'  '+'// like viewing the starfield through rippled glass',
'  float gMask = exp(-abs(r-hr)/(hr*1.6)) * suck;',
'  vec2 gd = vec2(fbm(p*GFREQ + t*.3), fbm(p*GFREQ - 7. - t*.25)) - .5;',
'  vec2 pg = p + gd * GAMP * gMask;',
'',
'  // gravitational lens: stars bow around the core instead of passing straight',
'  float lens = suck * hr*hr*LENS / (r*r + hr*hr*.5);',
'  vec2 pl = pg * (1. + lens);',
'  float rl = length(pl);',
'',
'  // chromatic aberration: per-channel swirl offset (the only color on stars)',
'  float ab = suck * clamp(340./max(rl,40.), 0., 6.) * AB;',
'  float fr = field(pl, t, suck, t,  ab);',
'  float fg = field(pl, t, suck, t,  0.);',
'  float fb = field(pl, t, suck, t, -ab);',
'  vec3 stars = vec3(fr, fg, fb);',
'  stars *= (1. - reveal) * (1. - dive*.7);',
'  col += stars;',
'',
'  // no end flash: the ring simply fades as the modal comes through it',
'  float ringA = (t < SUCK_END ? suck*.9 : 1.-reveal) * PORTAL;',
'',
'  // core mask: 0 inside horizon, 1 outside; gates stars vs tunnel interior',
'  float coreA = clamp(suck*2.5, 0., 1.) * (1.-reveal) * PORTAL;',
'  float core = smoothstep(hr*.8, hr*1.06, r);',
'  col *= mix(1., core, coreA);',
'',
'  // inside the horizon: swirling wisp tunnel',
'  if (coreA > .001 && core < .999){',
'    float ia = atan(p.y, p.x);',
'    float ir = r / hr;',
'    vec2 np  = vec2(ia*2.5 + ir*6. - t*1.8, ir*5. + t*.7);',
'    float wisp = fbm(np) * fbm(np*1.7 + vec2(t*.5, -t*.9)) * WISP;',
'    float depth = smoothstep(0., .85, ir);',
'    vec3 inner = mix(vec3(.015,.04,.08), vec3(.45,.62,.95), wisp*depth);',
'    inner += vec3(.85,.93,1.1) * pow(max(wisp*depth,0.), 3.) * 1.3;',
'    col = mix(col, inner*ringA, (1.-core)*coreA);',
'  }',
'',
'  // halo: cold blue-white, hot white line at the rim, glow radiates outward',
'  if (ringA > .01){',
'    float w = 14.;',
'    col += vec3(.55,.75,1.05) * exp(-pow(r-hr,2.)/w) * ringA * 1.1 * HALO;',
'    col += vec3(1.)           * exp(-pow(r-hr,2.)/(w*.3)) * ringA * .9 * HALO;',
'    col += vec3(.5,.7,1.) * exp(-max(r-hr,0.)/(hr*1.4)) * ringA * .35 * HALO * core;',
'  }',
'',
'  // the modal comes OUT of the portal: it pops from the centre with an',
'  '+'// easeOutBack overshoot while the ring fades around it (no flash)',
'  if (t > SUCK_END){',
'    float u = clamp((t-SUCK_END)/(DIVE_END-SUCK_END), 0., 1.);',
'    float ob = 1. + 2.70158*pow(u-1.,3.) + 1.70158*pow(u-1.,2.);',
'    vec2 hsz = WIN*.5 * max(ob, .02);',
'    float sd = roundRectSD(sp, hsz, 18.);',
'    float inside = smoothstep(1.5, -1.5, sd);',
'    col *= mix(1., .05, reveal * (1.-inside));',
'    col = mix(col, vec3(.01), inside*reveal*.94);',
'    float em = ease((t-SUCK_END)/1.4);',
'    float cf = calmField(sp, t);',
'    col += vec3(cf) * inside * em * reveal;',
'    col += vec3(1.) * exp(-abs(sd)*.35) * reveal * .18;',
'  }',
'',
'  gl_FragColor = vec4(col, 1.);',
'}'
].join('\n');

function shader(type, src) {
  var s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    err('shader: ' + gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}
var prog = gl.createProgram();
var vs = shader(gl.VERTEX_SHADER, VS), fs = shader(gl.FRAGMENT_SHADER, FS);
if (!vs || !fs) return;
gl.attachShader(prog, vs); gl.attachShader(prog, fs);
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) { err('link: ' + gl.getProgramInfoLog(prog)); return; }
gl.useProgram(prog);

var buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
var loc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

var uR = gl.getUniformLocation(prog, 'R');
var uT = gl.getUniformLocation(prog, 'T');
var uW = gl.getUniformLocation(prog, 'WIN');

// ---- tweakable params -------------------------------------------------
var DEFS = [
  // key, label, min, max, step, default, section
  ['PORTAL','portal on/off',0,   1,   1,   0,    'portal'],
  ['SW',    'swirl turns',  0,   20,  .5,  12,   'vortex'],
  ['KEP',   'kepler bias',  0,   1,   .05, .05,  null],
  ['RUSH',  'inward rush',  1,   14,  .5,  14,   null],
  ['STR',   'star stretch', 0,   30,  1,   30,   null],
  ['AB',    'aberration',   0,   .6,  .02, .32,  null],
  ['LENS',  'lens warp',    0,   8,   .25, 8,    null],
  ['GAMP',  'glass amount', 0,   200, 5,   110,  'glass distortion'],
  ['GFREQ', 'glass scale',  .005,.12, .005,.03,  null],
  ['WISP',  'tunnel wisps', 0,   6,   .2,  0,    'inside'],
  ['HALO',  'halo glow',    0,   3,   .1,  0,    'halo'],
  ['DIVEZ', 'dive depth',   .02, .6,  .02, .08,  'camera']
];
var P = {}, uLoc = {};
DEFS.forEach(function (d) { P[d[0]] = d[5]; uLoc[d[0]] = gl.getUniformLocation(prog, d[0]); });

var rows = document.getElementById('rows');
DEFS.forEach(function (d) {
  if (d[6]) {
    var s = document.createElement('div');
    s.className = 'sect'; s.textContent = d[6];
    rows.appendChild(s);
  }
  var row = document.createElement('div'); row.className = 'row';
  var lab = document.createElement('span'); lab.textContent = d[1];
  var inp = document.createElement('input');
  inp.type = 'range'; inp.min = d[2]; inp.max = d[3]; inp.step = d[4]; inp.value = d[5];
  var val = document.createElement('span'); val.className = 'val'; val.textContent = d[5];
  inp.oninput = function () { P[d[0]] = +inp.value; val.textContent = inp.value; };
  row.appendChild(lab); row.appendChild(inp); row.appendChild(val);
  rows.appendChild(row);
  d.inp = inp; d.val = val;
});
document.getElementById('reset').onclick = function () {
  DEFS.forEach(function (d) { P[d[0]] = d[5]; d.inp.value = d[5]; d.val.textContent = d[5]; });
};

// ---- time control: play/pause + scrub ---------------------------------
var simT = 0, playing = true, last = performance.now();
var scrub = document.getElementById('scrub');
var playBtn = document.getElementById('playBtn');
var scrubbing = false;
playBtn.onclick = function () { playing = !playing; playBtn.textContent = playing ? 'Pause' : 'Play'; };
scrub.oninput = function () { scrubbing = true; simT = +scrub.value; scrubbing = false; };
document.getElementById('replay').onclick = function () {
  simT = 0; playing = true; playBtn.textContent = 'Pause';
};

var W, H, DPR, winW, winH;
function size() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  glc.width = W*DPR; glc.height = H*DPR;
  tc.width = W*DPR; tc.height = H*DPR;
  tx.setTransform(DPR,0,0,DPR,0,0);
  gl.viewport(0, 0, glc.width, glc.height);
  winW = Math.min(560, W*.55); winH = Math.min(480, H*.7);
}
window.addEventListener('resize', size);
size();

var SUCK_END = 4.6, DIVE_END = 6.0, REVEAL_END = 6.0;  // text fades in as the pop completes

function drawText(t) {
  tx.clearRect(0, 0, W, H);
  var a = Math.min(1, Math.max(0, (t - REVEAL_END + .15) * 1.4));
  if (a <= 0) return;
  var cx = W/2, top = H/2 - winH/2;
  tx.globalAlpha = a;
  tx.textAlign = 'center';
  tx.fillStyle = '#ecebf5';
  tx.font = '700 26px -apple-system, system-ui, sans-serif';
  tx.fillText('Welcome to Gatecaster', cx, top + 84);
  tx.fillStyle = 'rgba(236,235,245,.62)';
  tx.font = '13px -apple-system, system-ui, sans-serif';
  tx.fillText('Your touchscreen, cast into a true Mac input surface.', cx, top + 110);
  tx.textAlign = 'left';
  var lx = cx - winW/2 + 70, ly = top + 168;
  var rows2 = [
    ['🌀', 'Open the gate', ' — pointer, taps, native gestures'],
    ['✨', 'Cast across space', ' — pinch, rotate, momentum scroll'],
    ['🛰️', 'Summon controls', ' — keyboard, trackpad & deck']
  ];
  for (var i = 0; i < 3; i++) {
    tx.font = '13px -apple-system, system-ui, sans-serif';
    tx.fillStyle = 'rgba(236,235,245,.9)';
    tx.fillText(rows2[i][0], lx, ly);
    tx.font = '600 13px -apple-system, system-ui, sans-serif';
    var x2 = lx + 26;
    tx.fillText(rows2[i][1], x2, ly);
    var w2 = tx.measureText(rows2[i][1]).width;
    tx.font = '13px -apple-system, system-ui, sans-serif';
    tx.fillStyle = 'rgba(236,235,245,.6)';
    tx.fillText(rows2[i][2], x2 + w2, ly);
    ly += 30;
  }
  var bw = 200, bh = 38, bx = cx - bw/2, by = top + winH - 96;
  var g = tx.createLinearGradient(0, by, 0, by + bh);
  g.addColorStop(0, '#ffffff'); g.addColorStop(1, '#d8d8d8');
  tx.fillStyle = g;
  tx.beginPath();
  tx.moveTo(bx+9, by);
  tx.arcTo(bx+bw, by, bx+bw, by+bh, 9);
  tx.arcTo(bx+bw, by+bh, bx, by+bh, 9);
  tx.arcTo(bx, by+bh, bx, by, 9);
  tx.arcTo(bx, by, bx+bw, by, 9);
  tx.fill();
  tx.fillStyle = '#000';
  tx.textAlign = 'center';
  tx.font = '600 13px -apple-system, system-ui, sans-serif';
  tx.fillText('Get Started', cx, by + 24);
  var dy = top + winH - 36;
  for (var d = 0; d < 4; d++) {
    tx.beginPath();
    tx.arc(cx - 21 + d*14, dy, 3, 0, 7);
    tx.fillStyle = d === 0 ? '#fff' : 'rgba(255,255,255,.22)';
    tx.fill();
  }
  tx.globalAlpha = 1;
}

function frame(now) {
  var dt = (now - last) / 1000; last = now;
  if (playing) simT += dt;          // run on past the timeline end so twinkle never freezes
  scrub.value = Math.min(8, simT);
  document.getElementById('tLabel').textContent = simT.toFixed(2) + 's';
  gl.uniform2f(uR, glc.width, glc.height);
  gl.uniform1f(uT, simT);
  gl.uniform2f(uW, winW*DPR, winH*DPR);
  for (var k in P) gl.uniform1f(uLoc[k], P[k]);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  drawText(simT);
  document.getElementById('phaseLabel').textContent =
    simT < 1.6 ? 'fill' : simT < SUCK_END ? 'vortex suck'
    : simT < DIVE_END ? 'dive + reveal' : 'confined';
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
