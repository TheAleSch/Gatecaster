<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Gatecaster — vortex intro demo</title>
<style>
  html,body { margin:0; height:100%; background:#000; overflow:hidden; font-family:-apple-system,system-ui,sans-serif; }
  #stage { position:fixed; inset:0; }
  canvas { position:absolute; inset:0; width:100%; height:100%; }
  #ui { position:fixed; top:14px; left:50%; transform:translateX(-50%); color:#888; font-size:12px;
        background:rgba(20,20,24,.7); border:1px solid #333; border-radius:8px; padding:6px 14px;
        backdrop-filter:blur(8px); z-index:10; display:flex; gap:12px; align-items:center }
  #ui button { background:#7a5cff; color:#fff; border:0; border-radius:6px; padding:4px 12px; font-size:12px; cursor:pointer }
  #winText { position:absolute; color:#eee; text-align:center; opacity:0; z-index:5; pointer-events:none; }
  #winText h1 { font-size:24px; font-weight:700; letter-spacing:-.4px; margin:0 0 6px; }
  #winText p { font-size:12.5px; opacity:.65; margin:0 0 18px; }
  #winText .rows { text-align:left; display:inline-block; font-size:12.5px; line-height:2; }
  #winText .cta { margin-top:18px; display:inline-block; background:linear-gradient(180deg,#7a5cff,#5b3df0);
                  border-radius:9px; padding:9px 40px; font-size:13px; font-weight:600; color:#fff;
                  box-shadow:0 4px 18px rgba(122,92,255,.4); }
</style>
</head>
<body>
<div id="stage"><canvas id="c"></canvas>
  <div id="winText">
    <h1>Welcome to Gatecaster</h1>
    <p>Your touchscreen, cast into a true Mac input surface.</p>
    <div class="rows">
      🌀 <b>Open the gate</b> — pointer, taps, native gestures<br>
      ✨ <b>Cast across space</b> — pinch, rotate, momentum scroll<br>
      🛰️ <b>Summon controls</b> — keyboard, trackpad &amp; deck
    </div><br>
    <span class="cta">Get Started</span>
  </div>
</div>
<div id="ui"><span id="phaseLabel">phase: fill</span><button onclick="restart()">Replay</button></div>

<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W, H, CX, CY, DPR;
function size() {
  DPR = devicePixelRatio || 1;
  W = innerWidth; H = innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  CX = W/2; CY = H/2;
}
addEventListener('resize', size); size();

// Final window the starfield collapses into
const WIN = () => ({ w: Math.min(560, W*.55), h: Math.min(460, H*.68) });

const N = 420;
let stars = [], t0 = 0;
function reset() {
  stars = [];
  for (let i=0;i<N;i++) {
    const x = Math.random()*W, y = Math.random()*H;
    const dx = x-CX, dy = y-CY;
    stars.push({
      r: Math.hypot(dx,dy),            // polar around centre
      a: Math.atan2(dy,dx),
      sz: .6+Math.random()*1.8,
      tw: Math.random()*Math.PI*2,     // twinkle phase
      born: Math.random()*1.4,         // staggered fade-in
      sucked: false,
      // post-collapse home inside the window (uniform fill)
      hx: (Math.random()-.5), hy: (Math.random()-.5),
      drift: .1+Math.random()*.35
    });
  }
  t0 = performance.now();
  document.getElementById('winText').style.opacity = 0;
}

// timeline (s): 0-1.6 fill | 1.6-4.6 vortex suck | 4.6-5.4 horizon flash + window reveal | 5.4+ confined
const FILL_END=1.6, SUCK_END=4.6, REVEAL_END=5.6;
const ease = u => u<0?0:u>1?1:u*u*(3-2*u);

function frame(now) {
  const t = (now-t0)/1000;
  const {w:WW,h:WH} = WIN();
  ctx.clearRect(0,0,W,H);
  // deep-space backdrop
  const bg = ctx.createRadialGradient(CX,CY*0.4,0,CX,CY,Math.max(W,H)*.8);
  bg.addColorStop(0,'#16102b'); bg.addColorStop(.5,'#0a0a12'); bg.addColorStop(1,'#040406');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  const phase = t<FILL_END?'fill':t<SUCK_END?'vortex suck':t<REVEAL_END?'event horizon':'confined';
  document.getElementById('phaseLabel').textContent = 'phase: '+phase;

  const suck = ease((t-FILL_END)/(SUCK_END-FILL_END));     // 0→1 during vortex
  const reveal = ease((t-SUCK_END)/(REVEAL_END-SUCK_END)); // 0→1 during reveal
  const horizonR = 26 + 40*Math.max(0,1-suck) + reveal*0;  // tight core during suck

  ctx.globalCompositeOperation = 'lighter';

  for (const s of stars) {
    const alive = Math.min(1,(t-s.born)/0.6);              // staggered fade-in
    if (alive<=0) continue;
    let x, y, alpha, ab;                                    // ab = aberration px
    if (t < SUCK_END) {
      // spiral inward: radius decays toward horizon, swirl accelerates as r shrinks
      const pull = suck*suck;
      const r = Math.max(horizonR, s.r*(1-pull) + horizonR*pull);
      const swirl = suck * 7 * (1 - r/Math.hypot(CX,CY));
      const a = s.a + swirl;
      x = CX + r*Math.cos(a); y = CY + r*Math.sin(a);
      alpha = alive*(.5+.5*Math.sin(s.tw+t*3));
      ab = suck * Math.min(8, 600/Math.max(r,40));         // aberration grows near horizon
      if (r <= horizonR+1) { s.sucked = true; alpha *= .25; }
    } else {
      // re-emerge confined inside the centred window, gentle drift
      const em = ease(Math.min(1,(t-SUCK_END)/1.4));
      const wx = CX + s.hx*WW*.92, wy = CY + s.hy*WH*.92;
      x = CX + (wx-CX)*em; y = CY + (wy-CY)*em;
      y -= ((t-SUCK_END)*s.drift*8) % (WH*.92) * 0;        // (drift kept subtle in demo)
      x += Math.sin(t*s.drift+s.tw)*2; y += Math.cos(t*s.drift*1.3+s.tw)*2;
      alpha = .25+.5*em*(.5+.5*Math.sin(s.tw+t*2));
      ab = (1-em)*4;
    }
    // chromatic aberration: 3 passes, r/g/b offset radially
    const dx=(x-CX), dy=(y-CY), d=Math.hypot(dx,dy)||1, ux=dx/d, uy=dy/d;
    const pass = [[255,80,80,-1],[120,255,140,0],[110,150,255,1]];
    for (const [R,G,B,o] of pass) {
      ctx.fillStyle = `rgba(${R},${G},${B},${alpha*0.55})`;
      ctx.beginPath();
      ctx.arc(x+ux*ab*o, y+uy*ab*o, s.sz, 0, 7);
      ctx.fill();
    }
  }

  // event horizon ring (during suck + flash at reveal)
  if (t>FILL_END) {
    const flash = t>SUCK_END ? Math.max(0,1-(t-SUCK_END)*1.6) : 0;
    const ringA = t<SUCK_END ? suck*.9 : flash;
    if (ringA>0.01) {
      for (const [col,off] of [['255,70,70',-2],['170,140,255',0],['90,140,255',2]]) {
        ctx.strokeStyle = `rgba(${col},${ringA})`;
        ctx.lineWidth = 2 + flash*6;
        ctx.beginPath(); ctx.arc(CX,CY,horizonR+off+flash*40,0,7); ctx.stroke();
      }
      const glow = ctx.createRadialGradient(CX,CY,0,CX,CY,horizonR*3+flash*120);
      glow.addColorStop(0,`rgba(140,110,255,${.35*ringA})`); glow.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle = glow; ctx.fillRect(0,0,W,H);
    }
  }

  ctx.globalCompositeOperation = 'source-over';

  // the centred window materialises out of the horizon
  if (t>SUCK_END) {
    const u = reveal;
    const rw = WW*(.2+.8*u), rh = WH*(.2+.8*u);
    ctx.save();
    ctx.globalAlpha = u;
    ctx.beginPath(); ctx.roundRect(CX-rw/2, CY-rh/2, rw, rh, 18);
    ctx.fillStyle = 'rgba(16,14,26,.55)';
    ctx.strokeStyle = 'rgba(140,120,255,.45)';
    ctx.lineWidth = 1.2;
    ctx.fill(); ctx.stroke();
    ctx.restore();
    // dim everything OUTSIDE the window once revealed (starfield confined)
    if (u>0.5) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(0,0,W,H);
      ctx.roundRect(CX-rw/2, CY-rh/2, rw, rh, 18);
      ctx.fillStyle = `rgba(0,0,0,${(u-0.5)*1.7})`;
      ctx.fill('evenodd');
      ctx.restore();
    }
    // welcome text fades in inside the window
    const txt = document.getElementById('winText');
    txt.style.opacity = Math.max(0,(t-REVEAL_END+0.2))*1.2;
    txt.style.left = (CX-WW/2)+'px'; txt.style.top = (CY-WH/2+44)+'px';
    txt.style.width = WW+'px';
  }

  requestAnimationFrame(frame);
}
function restart(){ reset(); }
reset();
requestAnimationFrame(frame);
</script>
</body>
</html>
